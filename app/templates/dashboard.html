<!DOCTYPE html>
<html>
<head>
    <title>TS Dashboard</title>
    <meta http-equiv="refresh" content="600">
    <link rel="stylesheet" href="/static/style.css">
</head>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const countdown = document.getElementById("countdown");
        const nextSyncIso = "{{ next_sync_iso }}";

        if (!countdown) {
            console.warn("Countdown element not found.");
            return;
        }

        if (!nextSyncIso) {
            countdown.textContent = "--:--";
            return;
        }

        function updateCountdown() {
            const refreshTime = new Date(nextSyncIso);
            const now = new Date();

            const diff = Math.floor((refreshTime.getTime() - now.getTime()) / 1000);

            if (diff <= 0) {
                window.location.reload();
                return;
            }

            const mins = Math.floor(diff / 60);
            const secs = diff % 60;

            countdown.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    });
</script>
<body>
    <main>
        <header class="page-header">
        <div>
            <h1>TS Dashboard</h1>

            <p class="subtitle">
                Tickets assigned to
                <span class="user-name">{{ current_user }}</span>
            </p>

            <div class="refresh-info">
                Last Jira sync: {{ last_sync }}
                • Refresh in <span id="countdown">--:--</span>
            </div>
        </div>
</header>

        <section class="tiles">
            {% for tile in tiles %}
            <a class="tile" href="/category/{{ tile.key }}">
                <div class="tile-count">{{ tile.count }}</div>
                <div class="tile-title">{{ tile.title }}</div>
                <div class="tile-description">{{ tile.description }}</div>
                <div class="tile-badge">{{ tile.count }} tickets</div>
            </a>
            {% endfor %}
        </section>
    </main>
</body>
</html>
